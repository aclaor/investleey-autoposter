name: Daily Result Checker

on:
  schedule:
    - cron: '0 20 * * *'  # Every day at 8pm UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run result checker
        env:
          CRYPTO_API_URL: ${{ secrets.CRYPTO_API_URL }}
          CRYPTO_API_TOKEN: ${{ secrets.CRYPTO_API_TOKEN }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TELEGRAM_BOT_TOKEN_CRYPTO: ${{ secrets.TELEGRAM_BOT_TOKEN_CRYPTO }}
          TELEGRAM_CRYPTO_CHANNEL: ${{ secrets.TELEGRAM_CRYPTO_CHANNEL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CRYPTO_CHANNEL: ${{ secrets.DISCORD_CRYPTO_CHANNEL }}
        run: python result_checker.py
