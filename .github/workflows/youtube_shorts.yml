name: Daily YouTube Shorts Scripts

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests
      - name: Generate scripts
        run: python youtube_shorts.py
