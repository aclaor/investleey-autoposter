name: 📢 Manual Multi-Platform Post

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Your post message'
        required: true
        type: string
      image_url:
        description: 'Image URL (paste imgbb link or leave empty)'
        required: false
        type: string
      platforms:
        description: 'Platforms to post to'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - facebook_instagram_only
          - telegram_only
          - facebook_only
          - instagram_only
          - twitter_only
          - linkedin_only
          - discord_only

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests requests-oauthlib Pillow

      - name: Post to platforms
        env:
          MESSAGE: ${{ github.event.inputs.message }}
          IMAGE_URL: ${{ github.event.inputs.image_url }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
          # Facebook & Instagram
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_CRYPTO }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CRYPTO_CHANNEL }}
          TELEGRAM_BOT_TOKEN_STOCKS: ${{ secrets.TELEGRAM_BOT_TOKEN_STOCKS }}
          TELEGRAM_STOCK_CHANNEL: ${{ secrets.TELEGRAM_STOCK_CHANNEL }}
          # Twitter/X
          TWITTER_API_KEY: ${{ secrets.X_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.X_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          # LinkedIn
          LI_ACCESS_TOKEN_CRYPTO: ${{ secrets.LI_ACCESS_TOKEN_CRYPTO }}
          LI_ACCESS_TOKEN_STOCKS: ${{ secrets.LI_ACCESS_TOKEN_STOCKS }}
          LI_ORG_ID_CRYPTO: ${{ secrets.LI_ORG_ID_CRYPTO }}
          LI_ORG_ID_STOCKS: ${{ secrets.LI_ORG_ID_STOCKS }}
          # Discord
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CRYPTO_CHANNEL: ${{ secrets.DISCORD_CRYPTO_CHANNEL }}
          DISCORD_STOCK_CHANNEL: ${{ secrets.DISCORD_STOCK_CHANNEL }}
          # Pinterest
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python manual_post.py
