name: YouTube Shorts Auto-Poster

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  post-crypto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests playwright pillow
          playwright install chromium --with-deps
          sudo apt-get install -y ffmpeg
      - name: Post crypto Short
        env:
          MODE: crypto
          POST_MODE: crypto
          CRYPTO_API_URL: ${{ secrets.CRYPTO_API_URL }}
          CRYPTO_API_TOKEN: ${{ secrets.CRYPTO_API_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python youtube_poster.py

  post-stocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests playwright pillow
          playwright install chromium --with-deps
          sudo apt-get install -y ffmpeg
      - name: Post stocks Short
        env:
          MODE: stocks
          POST_MODE: stocks
          STOCK_API_URL: ${{ secrets.STOCK_API_URL }}
          STOCK_API_TOKEN: ${{ secrets.STOCK_API_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python youtube_poster.py
