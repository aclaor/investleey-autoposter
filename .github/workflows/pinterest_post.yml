name: Pinterest Auto-Poster

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  post-crypto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium
      - name: Post crypto pin
        env:
          POST_MODE: crypto
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python pinterest_poster.py

  post-stocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium
      - name: Post stocks pin
        env:
          POST_MODE: stocks
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python pinterest_poster.py
