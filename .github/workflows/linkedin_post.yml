name: LinkedIn Auto-Post

on:
  schedule:
    - cron: '0 2,6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  post-stocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Post stocks to LinkedIn
        env:
          MODE: stocks
          POST_MODE: stocks
          STOCK_API_URL: ${{ secrets.STOCK_API_URL }}
          STOCK_API_TOKEN: ${{ secrets.STOCK_API_TOKEN }}
          LI_ACCESS_TOKEN_STOCKS: ${{ secrets.LI_ACCESS_TOKEN_STOCKS }}
          LI_ORG_ID_STOCKS: ${{ secrets.LI_ORG_ID_STOCKS }}
          LI_PERSON_ID: ${{ secrets.LI_PERSON_ID }}
        run: python linkedin_poster.py

  post-crypto:
    runs-on: ubuntu-latest
    needs: post-stocks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Post crypto to LinkedIn
        env:
          MODE: crypto
          POST_MODE: crypto
          CRYPTO_API_URL: ${{ secrets.CRYPTO_API_URL }}
          CRYPTO_API_TOKEN: ${{ secrets.CRYPTO_API_TOKEN }}
          LI_ACCESS_TOKEN_CRYPTO: ${{ secrets.LI_ACCESS_TOKEN_CRYPTO }}
          LI_ORG_ID_CRYPTO: ${{ secrets.LI_ORG_ID_CRYPTO }}
          LI_PERSON_ID: ${{ secrets.LI_PERSON_ID }}
        run: python linkedin_poster.py
