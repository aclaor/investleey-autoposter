name: Telegram Auto-Post

on:
  schedule:
    - cron: '30 * * * *'  # Every hour at :30 (offset from FB posts at :00)
  workflow_dispatch:

jobs:
  post-stocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          pip install requests
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Post stocks to Telegram
        env:
          TELEGRAM_BOT_TOKEN_STOCKS: ${{ secrets.TELEGRAM_BOT_TOKEN_STOCKS }}
          TELEGRAM_STOCK_CHANNEL: ${{ secrets.TELEGRAM_STOCK_CHANNEL }}
          POST_MODE: stocks
        run: python telegram_poster.py

  post-crypto:
    runs-on: ubuntu-latest
    needs: post-stocks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          pip install requests
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Post crypto to Telegram
        env:
          TELEGRAM_BOT_TOKEN_CRYPTO: ${{ secrets.TELEGRAM_BOT_TOKEN_CRYPTO }}
          TELEGRAM_CRYPTO_CHANNEL: ${{ secrets.TELEGRAM_CRYPTO_CHANNEL }}
          POST_MODE: crypto
        run: python telegram_poster.py
