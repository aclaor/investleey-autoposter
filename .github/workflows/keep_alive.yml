name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # Every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Singapore Render
        run: |
          echo "Pinging cryptovision-sg.onrender.com..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://cryptovision-sg.onrender.com/health \
            --max-time 90 \
            --connect-timeout 30 \
            --retry 2 \
            --retry-delay 10 || echo "000")
          echo "Response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Render is awake!"
          else
            echo "⚠️ Render returned $STATUS - it will wake up shortly"
          fi
